<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U F O Market</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Orbitron;
  background: radial-gradient(circle at top, #0a0014, #000);
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:25px;
  font-size:26px;
  font-weight:700;
  letter-spacing:3px;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc, 0 0 20px #7a00ff;
}

/* CONTAINER */
.container{
  padding:20px;
  display:grid;
  gap:15px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(0,255,204,0.3);
  border-radius:16px;
  padding:15px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 15px rgba(122,0,255,0.2);
}

/* ITEMS */
.item{
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(0,255,204,0.15);
}

.item b{
  color:#00ffcc;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:linear-gradient(90deg,#00ffcc,#7a00ff);
  color:black;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 0 15px #00ffcc;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.03);
}

/* SMALL TEXT */
.small{
  font-size:12px;
  opacity:0.7;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="header">🛸 U F O MARKET</div>

<div class="container">

  <!-- PRODUCTS -->
  <div class="card">
    <h2>🛒 Məhsullar</h2>

    <div class="item">
      <span>🎟 TikTok Jeton 1K</span>
      <b>19 AZN</b>
    </div>

    <div class="item">
      <span>⭐ Telegram Ulduzları 100</span>
      <b>3 AZN</b>
    </div>

    <div class="item">
      <span>⭐ Telegram Ulduzları 1000</span>
      <b>28 AZN</b>
    </div>
  </div>

  <!-- NFT -->
  <div class="card">
    <h2>👽 NFT Zone</h2>

    <div class="item">
      <span>Alien Rare NFT</span>
      <b>AVAILABLE</b>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="card">
    <h2>📡 Əlaqə Portalı</h2>

    <a class="btn" href="https://t.me/ufousd" target="_blank">
      TELEGRAMA KEÇ
    </a>

    <div class="small">
      kliklə → birbaşa UFO admin Telegram açılır
    </div>
  </div>

</div>

</body>
</html>
