<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto & NFT Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #141428, #0b0b14);
  color: white;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
  font-weight: 700;
  letter-spacing: 1px;
}

.crypto {
  display: flex;
  gap: 15px;
  font-size: 13px;
}

.crypto div {
  background: rgba(255,255,255,0.07);
  padding: 6px 10px;
  border-radius: 8px;
}

/* MAIN */
.container {
  padding: 20px;
  display: grid;
  gap: 20px;
}

/* SALES */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.09);
}

.sales-item {
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  background: rgba(0,0,0,0.25);
}

/* NFT */
.nft img {
  width: 180px;
  border-radius: 14px;
  margin-top: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.card {
  animation: fadeIn 0.6s ease;
}

/* MOBILE */
@media(max-width: 600px){
  .crypto {
    flex-wrap: wrap;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">CRYPTO DASH</div>
  <div class="crypto">
    <div>BTC $67,120</div>
    <div>ETH $3,210</div>
    <div>SOL $145</div>
  </div>
</div>

<div class="container">

  <!-- SALES -->
  <div class="card">
    <h2>Son Satışlar 🔥</h2>
    <div class="sales-item">150 stars satıldı</div>
    <div class="sales-item">100 stars satıldı</div>
    <div class="sales-item">800 stars satıldı</div>
  </div>

  <!-- NFT -->
  <div class="card nft">
    <h2>NFT Collection</h2>
    <img src="https://via.placeholder.com/200" alt="NFT">
    <p>Limited Edition Digital Asset</p>
  </div>

</div>

</body>
</html>
