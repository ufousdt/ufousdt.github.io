<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U F O Market</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0f0f10;
  color:white;
}

/* HERO */
.hero{
  height:220px;
  background:url("https://images.unsplash.com/photo-1520975922284-7c8c3c4b7c3b") center/cover;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

.hero-content{
  position:relative;
  text-align:center;
}

.hero h1{
  margin:0;
  font-size:28px;
  letter-spacing:3px;
}

.lang{
  margin-top:8px;
  font-size:12px;
  color:#00ff88;
}

/* CONTAINER */
.container{
  padding:20px;
  display:grid;
  gap:15px;
}

/* CARD */
.card{
  background:#161617;
  border:1px solid #2a2a2a;
  border-radius:14px;
  padding:15px;
}

/* ITEM */
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #2a2a2a;
}

.item:last-child{
  border:none;
}

.left{
  display:flex;
  align-items:center;
  gap:8px;
}

/* ICONS */
.icon{
  font-size:20px;
}

/* BUTTON */
.btn{
  background:#00ff88;
  color:black;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  text-decoration:none;
  font-weight:700;
}

/* NFT */
.nft{
  display:flex;
  gap:12px;
  align-items:center;
}

.nft img{
  width:90px;
  height:90px;
  border-radius:12px;
  object-fit:cover;
}

.tag{
  color:#00ff88;
  font-size:12px;
}

/* TELEGRAM BUTTON */
.bigbtn{
  display:block;
  text-align:center;
  padding:12px;
  margin-top:10px;
  background:#00ff88;
  color:black;
  border-radius:10px;
  font-weight:700;
  text-decoration:none;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>🛸 U F O MARKET</h1>
    <div class="lang">AZ / EN</div>
  </div>
</div>

<div class="container">

  <!-- PRODUCTS -->
  <div class="card">
    <h3>Məhsullar</h3>

    <div class="item">
      <div class="left">
        <span class="icon">🎵</span>
        <span>TikTok Jeton 1K – 19 AZN</span>
      </div>
      <a class="btn" href="https://t.me/ufousdt?text=TikTok%20Jeton%201K%20sifarişi" target="_blank">Buy</a>
    </div>

    <div class="item">
      <div class="left">
        <span class="icon">✈️</span>
        <span>Telegram Ulduzları 100 – 3 AZN</span>
      </div>
      <a class="btn" href="https://t.me/ufousdt?text=100%20Telegram%20Ulduzu%20sifarişi" target="_blank">Buy</a>
    </div>

    <div class="item">
      <div class="left">
        <span class="icon">✈️</span>
        <span>Telegram Ulduzları 1000 – 28 AZN</span>
      </div>
      <a class="btn" href="https://t.me/ufousdt?text=1000%20Telegram%20Ulduzu%20sifarişi" target="_blank">Buy</a>
    </div>

  </div>

  <!-- NFT -->
  <div class="card">
    <h3>NFT Koleksiyası</h3>

    <div class="nft">
      <img src="https://images.unsplash.com/photo-1620321023374-d1a68fbc720d">
      <div>
        <b>Alien NFT #01</b><br>
        <span class="tag">Razılaşma yolu ilə</span>
      </div>
    </div>

  </div>

  <!-- CONTACT -->
  <div class="card">
    <h3>Əlaqə</h3>

    <a class="bigbtn" href="https://t.me/ufousdt" target="_blank">
      Telegram: @ufousdt
    </a>
  </div>

</div>

</body>
</html>
