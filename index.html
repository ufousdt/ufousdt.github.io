<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO MARKET</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

/* HEADER */
.topbar{
  background:#111827;
  padding:16px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-weight:800;
  font-size:16px;
  letter-spacing:2px;
}

.cart{
  position:relative;
  font-size:22px;
  cursor:pointer;
}

.badge{
  position:absolute;
  top:-6px;
  right:-8px;
  background:#00ff88;
  color:#000;
  font-size:10px;
  width:16px;
  height:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  font-weight:700;
}

/* CONTAINER */
.container{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* CARD */
.card{
  background:#161b2e;
  border:1px solid #2a3355;
  border-radius:12px;
  padding:12px;
}

.title{font-size:14px;font-weight:600;}
.price{margin-top:5px;color:#00ff88;font-weight:700;}

.btn{
  display:block;
  margin-top:8px;
  padding:10px;
  text-align:center;
  background:#00ff88;
  color:#000;
  font-size:13px;
  border-radius:8px;
  text-decoration:none;
  font-weight:700;
  cursor:pointer;
}

/* CART PANEL */
.panel{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#0f172a;
  border-left:1px solid #2a3355;
  padding:15px;
  transition:0.3s;
}

.panel h3{margin-top:0;}

.close{
  background:red;
  color:white;
  padding:5px 10px;
  border:none;
  border-radius:6px;
  float:right;
}

.buy{
  background:#00ff88;
  color:#000;
  padding:10px;
  border:none;
  width:100%;
  border-radius:8px;
  font-weight:700;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div class="logo">🛸 UFO MARKET</div>

  <div class="cart" onclick="openCart()">
    🛒
    <div class="badge" id="count">0</div>
  </div>
</div>

<!-- PRODUCTS -->
<div class="container">

  <div class="card">
    <div class="title">🎁 TikTok Jeton 1K</div>
    <div class="price">19 AZN</div>
    <div class="btn" onclick="add('TikTok Jeton 1K')">Səbətə əlavə et</div>
  </div>

  <div class="card">
    <div class="title">⭐ Telegram Ulduz 100</div>
    <div class="price">3 AZN</div>
    <div class="btn" onclick="add('Telegram Ulduz 100')">Səbətə əlavə et</div>
  </div>

  <div class="card">
    <div class="title">🪖 PUBG Hesab</div>
    <div class="price">Razılaşma</div>
    <div class="btn" onclick="add('PUBG Hesab')">Səbətə əlavə et</div>
  </div>

</div>

<!-- CART PANEL -->
<div class="panel" id="panel">
  <button class="close" onclick="closeCart()">X</button>
  <h3>Səbət</h3>

  <div id="list"></div>

  <button class="buy" onclick="buy()">Sifarişi göndər</button>
</div>

<script>
let cart = [];

function add(item){
  cart.push(item);
  document.getElementById("count").innerText = cart.length;
}

function openCart(){
  document.getElementById("panel").style.right = "0";
  render();
}

function closeCart(){
  document.getElementById("panel").style.right = "-100%";
}

function render(){
  let html = "";
  cart.forEach(i=>{
    html += "<p>• "+i+"</p>";
  });
  document.getElementById("list").innerHTML = html;
}

function buy(){
  let msg = "Sifariş:%0A" + cart.join("%0A");
  window.open("https://t.me/ufousdt?text=" + msg, "_blank");
}
</script>

</body>
</html>
