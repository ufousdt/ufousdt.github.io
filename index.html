<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U F O Market</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0f0f10;
  color:white;
}

/* HERO */
.hero{
  height:220px;
  background:url("https://images.unsplash.com/photo-1520975922284-7c8c3c4b7c3b") center/cover;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.hero h1{
  position:relative;
  font-size:28px;
  letter-spacing:3px;
}

/* CONTAINER */
.container{
  padding:20px;
  display:grid;
  gap:15px;
}

/* CARD */
.card{
  background:#161617;
  border:1px solid #2a2a2a;
  border-radius:14px;
  padding:15px;
}

/* ITEM */
.item{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid #2a2a2a;
}

.item:last-child{
  border:none;
}

/* NFT CARD */
.nft{
  display:flex;
  gap:12px;
  align-items:center;
}

.nft img{
  width:90px;
  height:90px;
  border-radius:12px;
  object-fit:cover;
}

.tag{
  display:inline-block;
  margin-top:5px;
  font-size:12px;
  color:#00ff88;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  padding:12px;
  margin-top:10px;
  background:#00ff88;
  color:black;
  text-decoration:none;
  border-radius:10px;
  font-weight:700;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>U F O MARKET</h1>
</div>

<div class="container">

  <!-- PRODUCTS -->
  <div class="card">
    <h3>Məhsullar</h3>

    <div class="item">
      <span>TikTok Jeton 1K</span>
      <b>19 AZN</b>
    </div>

    <div class="item">
      <span>Telegram Ulduzları 100</span>
      <b>3 AZN</b>
    </div>

    <div class="item">
      <span>Telegram Ulduzları 1000</span>
      <b>28 AZN</b>
    </div>
  </div>

  <!-- NFT -->
  <div class="card">
    <h3>NFT Koleksiyası</h3>

    <div class="nft">
      <img src="https://images.unsplash.com/photo-1620321023374-d1a68fbc720d">
      <div>
        <b>Alien NFT #01</b><br>
        <span class="tag">Razılaşma yolu ilə</span>
      </div>
    </div>

  </div>

  <!-- CONTACT -->
  <div class="card">
    <h3>Əlaqə</h3>

    <a class="btn" href="https://t.me/ufousdt" target="_blank">
      Telegram: @ufousdt
    </a>
  </div>

</div>

</body>
</html>
