<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U F O Market</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f5f6f8; /* ağ fon */
  color:#111;
}

/* HEADER */
.header{
  background:#0f172a; /* qara */
  color:white;
  padding:15px;
  text-align:center;
  font-weight:700;
  letter-spacing:2px;
}

/* GRID */
.container{
  padding:15px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
  border:1px solid #e5e7eb;
}

/* IMAGE */
.card img{
  width:100%;
  height:110px;
  object-fit:cover;
}

/* CONTENT */
.content{
  padding:10px;
}

.title{
  font-size:14px;
  font-weight:600;
}

.price{
  margin-top:5px;
  font-size:13px;
  color:#16a34a; /* yaşıl */
  font-weight:700;
}

/* BUTTON */
.btn{
  display:block;
  margin-top:8px;
  padding:8px;
  text-align:center;
  background:#16a34a; /* yaşıl */
  color:white;
  font-size:12px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
  transition:0.2s;
}

.btn:hover{
  background:#128a3d;
}

/* SMALL TAG */
.tag{
  font-size:11px;
  color:#6b7280;
  margin-top:3px;
}
</style>

</head>

<body>

<div class="header">U F O MARKET</div>

<div class="container">

  <!-- TIKTOK -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1611162616305-c69b3fa7fbe0">
    <div class="content">
      <div class="title">TikTok Jeton 1K</div>
      <div class="price">19 AZN</div>
      <div class="tag">Digital Product</div>
      <a class="btn" href="https://t.me/ufousdt">Buy</a>
    </div>
  </div>

  <!-- TELEGRAM 100 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1611605698335-8b1569810432">
    <div class="content">
      <div class="title">Telegram Ulduz 100</div>
      <div class="price">3 AZN</div>
      <div class="tag">Instant Delivery</div>
      <a class="btn" href="https://t.me/ufousdt">Buy</a>
    </div>
  </div>

  <!-- TELEGRAM 1000 -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1611746872915-64382b5c76da">
    <div class="content">
      <div class="title">Telegram Ulduz 1000</div>
      <div class="price">28 AZN</div>
      <div class="tag">Best Value</div>
      <a class="btn" href="https://t.me/ufousdt">Buy</a>
    </div>
  </div>

  <!-- NFT -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1634973357973-f2ed2657db3c">
    <div class="content">
      <div class="title">Alien NFT</div>
      <div class="price">Razılaşma</div>
      <div class="tag">NFT Collection</div>
      <a class="btn" href="https://t.me/ufousdt">Contact</a>
    </div>
  </div>

</div>

</body>
</html>
