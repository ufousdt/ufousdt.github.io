<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U F O Market</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#f5f6f8;
  color:#111;
}

/* HEADER */
.header{
  background:#111827;
  color:white;
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:700;
}

/* CONTAINER */
.container{
  padding:20px;
  display:grid;
  gap:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* ITEM */
.item{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid #eee;
}

.item:last-child{
  border-bottom:none;
}

/* BUTTON */
.btn{
  display:block;
  text-align:center;
  padding:12px;
  margin-top:10px;
  background:#2563eb;
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-weight:600;
}
</style>

</head>

<body>

<div class="header">U F O MARKET</div>

<div class="container">

  <!-- PRODUCTS -->
  <div class="card">
    <h3>Məhsullar</h3>

    <div class="item">
      <span>TikTok Jeton 1K</span>
      <b>19 AZN</b>
    </div>

    <div class="item">
      <span>Telegram Ulduzları 100</span>
      <b>3 AZN</b>
    </div>

    <div class="item">
      <span>Telegram Ulduzları 1000</span>
      <b>28 AZN</b>
    </div>
  </div>

  <!-- NFT -->
  <div class="card">
    <h3>NFT</h3>

    <div class="item">
      <span>Alien NFT Collection</span>
      <b>Available</b>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="card">
    <h3>Əlaqə</h3>

    <a class="btn" href="https://t.me/ufousdt" target="_blank">
      Telegram: @ufousdt
    </a>
  </div>

</div>

</body>
</html>
